version: '3'

vars:
  OUTPUT_DIR: '{{.OUTPUT_DIR | default "./release-output"}}'
  REPO: '{{.REPO | default "openemr/openemr"}}'

tasks:
  setup:
    desc: Install PHP dependencies
    cmds:
      - composer install --no-interaction --no-progress
    sources:
      - composer.json
      - composer.lock
    generates:
      - vendor/autoload.php

  test:
    desc: Run PHPUnit test suite
    deps: [setup]
    cmds:
      - vendor/bin/phpunit

  changelog:
    desc: Generate changelog from commit range
    requires:
      vars: [BASE_REF]
    deps: [setup]
    cmds:
      - mkdir -p {{shellQuote .OUTPUT_DIR}}
      - >-
        php bin/changelog.php
        --base={{shellQuote .BASE_REF}}
        {{if .HEAD_REF}}--head={{shellQuote .HEAD_REF}}{{end}}
        {{if .TITLE}}--title={{shellQuote .TITLE}}{{end}}
        --repo={{shellQuote .REPO}}
        --output={{shellQuote .OUTPUT_DIR}}/changelog.md
        {{if eq .NO_GHSA "1"}}--no-ghsa{{end}}

  version-bump:
    desc: Bump version numbers in OpenEMR source files
    requires:
      vars: [MODE, OPENEMR_DIR]
    deps: [setup]
    cmds:
      - >-
        php bin/version-bump.php
        --mode={{shellQuote .MODE}}
        {{if eq .MODE "patch"}}--patch-number={{shellQuote .PATCH_NUMBER}}{{end}}
        --version-file={{shellQuote .OPENEMR_DIR}}/version.php
        --globals-file={{shellQuote .OPENEMR_DIR}}/library/globals.inc.php

  preflight:
    desc: Run pre-release checks
    deps: [setup]
    cmds:
      - >-
        php bin/preflight.php
        {{if and .MILESTONE (ne .SKIP_MILESTONE "1")}}--milestone={{shellQuote .MILESTONE}}{{end}}
        --repo={{shellQuote .REPO}}
        {{if eq .SKIP_MILESTONE "1"}}--skip-milestone{{end}}
        {{if eq .SKIP_GHSA "1"}}--skip-ghsa{{end}}

  checksum:
    desc: Generate checksum sidecar files
    requires:
      vars: [FILE]
    # Run from OUTPUT_DIR and checksum the basename FILE so the sidecar records
    # `openemr-x.tar.gz`, not `release-output/openemr-x.tar.gz`. Otherwise
    # `sha256sum -c` fails once users download the assets into a flat directory
    # and the recorded path's `release-output/` prefix is absent.
    dir: '{{.OUTPUT_DIR}}'
    cmds:
      - md5sum {{shellQuote .FILE}} > {{shellQuote .FILE}}.md5
      - sha256sum {{shellQuote .FILE}} > {{shellQuote .FILE}}.sha256
      - sha512sum {{shellQuote .FILE}} > {{shellQuote .FILE}}.sha512

  tag:
    desc: Create annotated git tag and push
    requires:
      vars: [TAG, REF]
    status:
      - git rev-parse {{shellQuote .TAG}} >/dev/null 2>&1
    cmds:
      - git tag -a {{shellQuote .TAG}} {{shellQuote .REF}} -m "Release {{.TAG}}"
      - git push origin {{shellQuote .TAG}}

  release:
    desc: Create GitHub release
    requires:
      vars: [TAG]
    status:
      - gh release view {{shellQuote .TAG}} --repo {{shellQuote .REPO}} >/dev/null 2>&1
    cmds:
      - >-
        gh release create {{shellQuote .TAG}}
        --repo {{shellQuote .REPO}}
        --title {{shellQuote .TAG}}
        {{if .NOTES_FILE}}--notes-file {{shellQuote .NOTES_FILE}}{{end}}

  release:upload:
    desc: Upload assets to an existing GitHub release
    requires:
      vars: [TAG, ASSETS]
    cmds:
      - >-
        gh release upload {{shellQuote .TAG}}
        --repo {{shellQuote .REPO}}
        --clobber
        {{.ASSETS}}

  changelog-pr:
    desc: Create CHANGELOG.md update PRs
    requires:
      vars: [VERSION, BRANCHES, OPENEMR_DIR]
    deps: [setup]
    cmds:
      - >-
        php bin/changelog-pr.php
        --release-version={{shellQuote .VERSION}}
        --branches={{shellQuote .BRANCHES}}
        --openemr-dir={{shellQuote .OPENEMR_DIR}}
        --changelog-file={{shellQuote .OUTPUT_DIR}}/changelog.md
        --repo={{shellQuote .REPO}}

  patch:assemble:
    desc: Build cumulative patch zip from diff between tags
    requires:
      vars: [START_TAG, BRANCH, FILENAME, OPENEMR_DIR]
    deps: [setup]
    cmds:
      - >-
        php bin/patch-assemble.php
        --start-tag={{shellQuote .START_TAG}}
        --branch={{shellQuote .BRANCH}}
        --filename={{shellQuote .FILENAME}}
        --openemr-dir={{shellQuote .OPENEMR_DIR}}
        --output-dir={{shellQuote .OUTPUT_DIR}}
        {{if .COPY_STYLES}}--copy-styles{{end}}

  package:assemble:
    desc: Build the full distribution tarball + zip for an official release
    requires:
      vars: [VERSION, OPENEMR_DIR]
    deps: [setup]
    cmds:
      - >-
        php bin/package-assemble.php
        --release-version={{shellQuote .VERSION}}
        --openemr-dir={{shellQuote .OPENEMR_DIR}}
        --output-dir={{shellQuote .OUTPUT_DIR}}

  compatibility:
    desc: Inject the minimum-supported-versions section into the release notes
    requires:
      vars: [VERSION_BRANCH, OPENEMR_DIR]
    deps: [setup]
    cmds:
      - >-
        php bin/derive-compatibility.php
        --version-branch={{shellQuote .VERSION_BRANCH}}
        --openemr-dir={{shellQuote .OPENEMR_DIR}}
        --repo={{shellQuote .REPO}}
        --notes-file={{shellQuote .OUTPUT_DIR}}/changelog.md

  release:rotate:
    desc: Apply 3-slot rotation per versions.yml (idempotent)
    deps: [setup]
    cmds:
      - >-
        php bin/rotate.php
        --repo={{shellQuote (default "../.." .ROTATE_REPO)}}
        {{if .CURRENT}}--current={{shellQuote .CURRENT}}{{end}}
        {{if .NEXT}}--next={{shellQuote .NEXT}}{{end}}
        {{if .DEV}}--dev={{shellQuote .DEV}}{{end}}
        {{if eq .DRY_RUN "1"}}--dry-run{{end}}

  release:lint-versions:
    desc: Verify every OpenEMR version pin is enumerated in versions.yml
    deps: [setup]
    cmds:
      - >-
        php bin/lint-versions.php
        --repo={{shellQuote (default "../.." .ROTATE_REPO)}}

  ci:check-dockerhub-credential:
    desc: Smoke-test DOCKERHUB_USERNAME / DOCKERHUB_TOKEN against the readme-push API path
    deps: [setup]
    cmds:
      - >-
        php bin/check-dockerhub-credential.php
        {{if .REPOSITORY}}--repository={{shellQuote .REPOSITORY}}{{end}}

  release:render-dockerhub-overview:
    desc: Render the Docker Hub readme for openemr/openemr from versions.yml
    deps: [setup]
    cmds:
      - >-
        php bin/render-dockerhub-overview.php
        --repo={{shellQuote (default "../.." .ROTATE_REPO)}}
        {{if .OUTPUT}}--output={{shellQuote .OUTPUT}}{{end}}

  release:verify-tag:
    desc: Verify a release tag is annotated and well-formed per #664 spec
    requires:
      vars: [TAG]
    deps: [setup]
    cmds:
      - >-
        php bin/verify-tag.php
        --repo={{shellQuote (default "../.." .TAG_REPO)}}
        --tag={{shellQuote .TAG}}

  release:check-vendored:
    desc: Verify a consumer repo's vendored contracts match canonical
    requires:
      vars: [CONSUMER]
    deps: [setup]
    cmds:
      - >-
        php bin/check-vendored.php
        --consumer={{shellQuote .CONSUMER}}
        {{if .CANONICAL}}--canonical={{shellQuote .CANONICAL}}{{end}}

  release:derive-slots-from-dispatch:
    desc: Translate a repository_dispatch envelope into slot=<value> lines
    requires:
      vars: [EVENT_TYPE]
    vars:
      PAYLOAD_FILE: '{{.PAYLOAD_FILE | default "-"}}'
    deps: [setup]
    cmds:
      - >-
        php bin/derive-slots-from-dispatch.php
        --event-type={{shellQuote .EVENT_TYPE}}
        --payload-file={{shellQuote .PAYLOAD_FILE}}

  release:derive-announcement-inputs:
    desc: Emit version/tag/branch/forum_url lines for the announcements workflow
    deps: [setup]
    cmds:
      - >-
        php bin/derive-announcement-inputs.php
        {{if .PAYLOAD_FILE}}--payload-file={{shellQuote .PAYLOAD_FILE}}{{end}}
        {{if .VERSION}}--release-version={{shellQuote .VERSION}}{{end}}
        {{if .TAG}}--release-tag={{shellQuote .TAG}}{{end}}
        {{if .BRANCH}}--release-branch={{shellQuote .BRANCH}}{{end}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}

  release:derive-build-inputs:
    desc: Emit version/version_branch/release_tag lines for the build-release workflow
    deps: [setup]
    cmds:
      - >-
        php bin/derive-build-inputs.php
        {{if .PAYLOAD_FILE}}--payload-file={{shellQuote .PAYLOAD_FILE}}{{end}}
        {{if .VERSION}}--release-version={{shellQuote .VERSION}}{{end}}
        {{if .TAG}}--release-tag={{shellQuote .TAG}}{{end}}
        {{if .BRANCH}}--release-branch={{shellQuote .BRANCH}}{{end}}

  release:render-announcements:
    desc: Render per-channel release-announcement drafts to a directory
    requires:
      vars: [OUTPUT_DIR, VERSION, TAG, BRANCH]
    deps: [setup]
    cmds:
      - >-
        php bin/render-announcements.php
        --output-dir={{shellQuote .OUTPUT_DIR}}
        --release-version={{shellQuote .VERSION}}
        --release-tag={{shellQuote .TAG}}
        --release-branch={{shellQuote .BRANCH}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}

  release:render-announcement-step-summary:
    desc: Render the GitHub Actions step-summary markdown for the announcement drafts
    requires:
      vars: [OUTPUT_DIR, VERSION, TAG]
    deps: [setup]
    cmds:
      - >-
        php bin/render-announcement-step-summary.php
        --output-dir={{shellQuote .OUTPUT_DIR}}
        --release-version={{shellQuote .VERSION}}
        --release-tag={{shellQuote .TAG}}
        {{if .FORUM_URL}}--forum-url={{shellQuote .FORUM_URL}}{{end}}
        {{if .OUTPUT}}--output={{shellQuote .OUTPUT}}{{end}}

  release:open-rotation-pr:
    desc: Open or update the long-lived rotation draft PR
    requires:
      vars: [BRANCH, BASE]
    deps: [setup]
    cmds:
      - >-
        php bin/open-rotation-pr.php
        --branch={{shellQuote .BRANCH}}
        --base={{shellQuote .BASE}}
        {{if .TITLE}}--title={{shellQuote .TITLE}}{{end}}
        {{if .TRIGGER}}--trigger={{shellQuote .TRIGGER}}{{end}}
        {{if .RUN_URL}}--run-url={{shellQuote .RUN_URL}}{{end}}
        {{if .CURRENT}}--current={{shellQuote .CURRENT}}{{end}}
        {{if .NEXT}}--next={{shellQuote .NEXT}}{{end}}
        {{if .DEV}}--dev={{shellQuote .DEV}}{{end}}

  release:push-rotation-branch:
    desc: Force-push the rotation working tree as a single bot commit
    requires:
      vars: [ROTATION_BRANCH, COMMIT_MESSAGE]
    dir: '../..'
    env:
      GIT_AUTHOR_NAME: openemr-release-bot[bot]
      GIT_AUTHOR_EMAIL: openemr-release-bot[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: openemr-release-bot[bot]
      GIT_COMMITTER_EMAIL: openemr-release-bot[bot]@users.noreply.github.com
    cmds:
      - git fetch origin {{shellQuote .ROTATION_BRANCH}} 2>/dev/null || true
      - git checkout -B {{shellQuote .ROTATION_BRANCH}}
      - git add -A
      - git commit -m {{shellQuote .COMMIT_MESSAGE}}
      - git push --force-with-lease origin {{shellQuote .ROTATION_BRANCH}}

  release:ship:
    desc: Merge the three release PRs (infra → conductor → docs) in order (issue #705)
    requires:
      vars: [VERSION, REL_BRANCH]
    deps: [setup]
    cmds:
      - >-
        php bin/ship-release.php
        --release-version={{shellQuote .VERSION}}
        --rel-branch={{shellQuote .REL_BRANCH}}
        {{if .TIMEOUT_SECONDS}}--timeout-seconds={{shellQuote .TIMEOUT_SECONDS}}{{end}}
        {{if .STATUS_TARGET_URL}}--status-target-url={{shellQuote .STATUS_TARGET_URL}}{{end}}
        {{if .SUMMARY_FILE}}--summary-file={{shellQuote .SUMMARY_FILE}}{{end}}
        {{if eq .DRY_RUN "1"}}--dry-run{{end}}

  release:probe-app-installation:
    desc: Verify the release App is installed on $OWNER/$REPO_NAME
    deps: [setup]
    cmds:
      - php bin/probe-app.php --check=installation

  release:probe-app-metadata:
    desc: Verify the release App has metadata:read on $OWNER/$REPO_NAME
    deps: [setup]
    cmds:
      - php bin/probe-app.php --check=metadata

  release:probe-app-contents-write:
    desc: Verify the release App can create a branch and commit a stub
    deps: [setup]
    cmds:
      - php bin/probe-app.php --check=contents-write

  release:probe-app-pull-requests-write:
    desc: Verify the release App can open and close a draft PR
    deps: [setup]
    cmds:
      - php bin/probe-app.php --check=pull-requests-write

  release:probe-app-cleanup:
    desc: Best-effort delete the throwaway probe branch
    deps: [setup]
    cmds:
      - php bin/probe-app.php --check=cleanup

  summary:
    desc: Generate release summary
    requires:
      vars: [TYPE, MILESTONE]
    deps: [setup]
    cmds:
      - >-
        php bin/summary.php
        --type={{shellQuote .TYPE}}
        --milestone={{shellQuote .MILESTONE}}
        --output-dir={{shellQuote .OUTPUT_DIR}}
        {{if .RELEASE_TAG}}--release-tag={{shellQuote .RELEASE_TAG}}{{end}}
        {{if .START_TAG}}--start-tag={{shellQuote .START_TAG}}{{end}}
        {{if .VERSION_BRANCH}}--version-branch={{shellQuote .VERSION_BRANCH}}{{end}}
        {{if .PATCH_FILENAME}}--patch-filename={{shellQuote .PATCH_FILENAME}}{{end}}
        {{if .PATCH_NUMBER}}--patch-number={{shellQuote .PATCH_NUMBER}}{{end}}
        {{if .DRY_RUN}}--dry-run{{end}}
        {{if .COPY_STYLES}}--copy-styles{{end}}
