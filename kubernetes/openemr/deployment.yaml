apiVersion: apps/v1
kind: Deployment
metadata:  
  labels:
    name: openemr
  name: openemr
spec:
  replicas: 3
  selector:
    matchLabels:
      name: openemr
  strategy:
    type: Recreate
  template:
    metadata:      
      labels:
        name: openemr
    spec:
      automountServiceAccountToken: false
      initContainers:
      - name: init-mysql-wait
        image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command: ['sh', '-c', "until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done"]
      - name: init-redis-wait
        image: busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command: ['sh', '-c', "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
      - env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_PASS
          valueFrom:
            secretKeyRef:
              name: openemr-credentials
              key: mysql-pass
        - name: MYSQL_ROOT_PASS
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
        - name: MYSQL_USER
          value: "openemr"
        - name: OE_PASS
          valueFrom:
            secretKeyRef:
              name: openemr-credentials
              key: admin-pass
        - name: OE_USER
          value: "admin"
        - name: SESSION_STORAGE_MODE
          value: "predis-sentinel"
        - name: REDIS_SENTINELS
          value: "sentinel-0.sentinel|||sentinel-1.sentinel|||sentinel-2.sentinel"
        - name: REDIS_MASTER
          value: "mymaster"
        - name: REDIS_SENTINELS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: default-password
        - name: REDIS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: default-password
        - name: REDIS_TLS
          value: "yes"
        - name: REDIS_X509
          value: "yes"
        - name: REDIS_TLS_CERT_KEY_PATH
          value: "/redis-certs"
        # To downgrade redis connection security:
        #   tls (no client certs): remove REDIS_X509 above and remove redis client cert/key volume items below
        #   tcp (no encryption): also remove REDIS_TLS and REDIS_TLS_CERT_KEY_PATH above and remove
        #     the entire redis-openemr-client-certs volume and volumeMount below
        - name: SWARM_MODE
          value: "yes"
        - name: FORCE_DATABASE_X509_CONNECT
          value: "1"
        # To downgrade mysql connection security:
        #   tls (no client certs): change FORCE_DATABASE_X509_CONNECT to FORCE_DATABASE_SSL_CONNECT
        #     and remove mysql cert/key volume mounts below
        #   tcp (no encryption): also remove the env var above and remove mysql ca volume mount below
        image: openemr/openemr:8.2.0@sha256:dab7f20f774bafbe596c85d3574261ea5e61bf0936fc81513d3f872f40adf489
        name: openemr
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          limits:
            cpu: 1000m
            memory: 1G
        readinessProbe:
          exec:
            command:
            - cat
            - /root/instance-swarm-ready
          initialDelaySeconds: 5
          periodSeconds: 30
        livenessProbe:
          tcpSocket:
            port: 443
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - mountPath: /root/certs/mysql/server
          name: mysql-openemr-client-certs
        - mountPath: /redis-certs
          name: redis-openemr-client-certs
        - mountPath: /var/www/localhost/htdocs/openemr/sites
          name: websitevolume
        - mountPath: /etc/ssl
          name: sslvolume
        - mountPath: /etc/letsencrypt
          name: letsencryptvolume
      restartPolicy: Always     
      volumes:
      - name: mysql-openemr-client-certs
        secret:
          secretName: mysql-openemr-client-certs
          items:
          - key: ca.crt
            path: mysql-ca
          - key: tls.crt
            path: mysql-cert
          - key: tls.key
            path: mysql-key
      - name: redis-openemr-client-certs
        secret:
          secretName: redis-openemr-client-certs
          items:
          - key: ca.crt
            path: redis-master-ca
          - key: tls.crt
            path: redis-master-cert
          - key: tls.key
            path: redis-master-key
          - key: ca.crt
            path: redis-sentinel-ca
          - key: tls.crt
            path: redis-sentinel-cert
          - key: tls.key
            path: redis-sentinel-key
      - name: websitevolume
        persistentVolumeClaim:
          claimName: websitevolume
      - name: sslvolume
        persistentVolumeClaim:
          claimName: sslvolume
      - name: letsencryptvolume
        persistentVolumeClaim:
          claimName: letsencryptvolume
