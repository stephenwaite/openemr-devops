apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-sts
spec:
  serviceName: "mysql"
  replicas: 2
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      automountServiceAccountToken: false
      initContainers:
      - name: init-mysql
        args:
        - mariadbd
        - --character-set-server=utf8mb4
        image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
        env:
        - name: MYSQL_REPL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-replication-credentials
              key: password
        command:
        - bash
        - "-c"
        - |
          set -ex
          echo 'Starting init-mariadb';
          # Check config map to directory that already exists
          # (but must be used as a volume for main container)
          ls /mnt/config-map
          # Statefulset has sticky identity, number should be last
          [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          # Copy appropriate conf.d files from config-map to
          # mysql-config volume (emptyDir) depending on pod number
          if [[ $ordinal -eq 0 ]]; then
            # This file holds SQL for connecting to primary
            cp /mnt/config-map/primary.cnf /etc/mysql/conf.d/server-id.cnf
            # Create the users needed for replication on primary on a volume
            # initdb (emptyDir)
            cp /mnt/config-map/primary.sql /docker-entrypoint-initdb.d
          else
            # This file holds SQL for connecting to secondary
            cp /mnt/config-map/replica.cnf /etc/mysql/conf.d/server-id.cnf
            # On replicas use secondary configuration on initdb volume
            cp /mnt/config-map/secondary.sql /docker-entrypoint-initdb.d
          fi
          # Inject replication password from secret
          # Validate password doesn't contain characters that would break SQL literals
          set +x
          case "$MYSQL_REPL_PASSWORD" in
            *"'"*|*$'\n'*|*$'\r'*|*$'\t'*|*";"*)
              echo "ERROR: MYSQL_REPL_PASSWORD contains unsafe characters for SQL (single quote, newline, semicolon)" >&2
              exit 1
              ;;
          esac
          for f in /docker-entrypoint-initdb.d/*.sql; do
            contents=$(<"$f")
            printf '%s\n' "${contents//__REPL_PASSWORD__/$MYSQL_REPL_PASSWORD}" > "$f"
          done
          set -x
          # Add an offset to avoid reserved server-id=0 value.
          echo server-id=$((3000 + $ordinal)) >> etc/mysql/conf.d/server-id.cnf
          ls /etc/mysql/conf.d/
          cat /etc/mysql/conf.d/server-id.cnf
        volumeMounts:
          - name: mysql-config-map
            mountPath: /mnt/config-map
          - name: mysql-config
            mountPath: /etc/mysql/conf.d/
          - name: initdb
            mountPath: /docker-entrypoint-initdb.d
      containers:
      - name: mysql
        args:
        - mariadbd
        - --character-set-server=utf8mb4
        image: mariadb:11.8.8@sha256:efb4959ef2c835cd735dbc388eb9ad6aab0c78dd64febcd51bc17481111890c4
        ports:
        - containerPort: 3306
          name: mysql-port
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mariadb-admin ping -u root
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mariadb-admin ping -u root
          initialDelaySeconds: 15
          periodSeconds: 10
        env:
        # Using Secrets
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
        - name: MYSQL_INITDB_SKIP_TZINFO
          value: "1"
        # Mount volume from persistent volume claim
        volumeMounts:
        - name: mysql-server-certs
          mountPath: /etc/mysql/ssl/main/
        - name: mysql-replication-certs
          mountPath: /etc/mysql/ssl/replication/
        - name: datadir
          mountPath: /var/lib/mysql/
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-server-certs
        secret:
          secretName: mysql-server-certs
          items:
          - key: ca.crt
            path: ca.crt
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      - name: mysql-replication-certs
        secret:
          secretName: mysql-replication-certs
          items:
          - key: ca.crt
            path: ca.crt
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      - name: mysql-config-map
        configMap:
          name: mysql-configmap
          #defaultMode: 0544
      - name: mysql-config
        emptyDir: {}
      - name: initdb
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi