# four node (three workers) cluster config
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8800
    listenAddress: "127.0.0.1"
  - containerPort: 30443
    hostPort: 9800
    listenAddress: "127.0.0.1"
- role: worker
- role: worker
- role: worker
