name: Production 8.0.0 Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    # Only run from master branch on the main repository
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr-devops' && github.ref == 'refs/heads/rel-800'
    runs-on: ubuntu-22.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Get build date
        id: build_date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Build and push 8.0.0 docker
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:docker/openemr/8.0.0"
          tags: openemr/openemr:8.0.0, openemr/openemr:8.0.0.3, openemr/openemr:8.0.0.3-${{ steps.build_date.outputs.date }}, openemr/openemr:latest
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
