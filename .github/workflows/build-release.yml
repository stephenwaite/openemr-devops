name: Build Release
run-name: "Build Release ${{ inputs.version }}${{ inputs.dry_run && ' (dry run)' || '' }}"

on:
  workflow_dispatch:
    inputs:
      version_branch:
        description: Release branch (e.g., rel-800)
        required: true
        type: string
      version:
        description: Human-readable version (e.g., 8.0.0)
        required: true
        type: string
      release_tag:
        description: Git tag (e.g., v8_0_0). Required unless dry run.
        required: false
        type: string
      base_ref:
        description: Previous release tag for changelog (e.g., v7_3_7)
        required: true
        type: string
      milestone:
        description: GitHub milestone name for preflight check (e.g., 8.0.0)
        required: false
        type: string
      dry_run:
        description: Dry run — build only, skip release
        type: boolean
        default: true
      validate_token:
        description: Generate and verify the app token (use with dry run to test permissions)
        type: boolean
        default: false
      skip_milestone_check:
        description: Skip milestone open-items check
        type: boolean
        default: false
      skip_ghsa_check:
        description: Skip unpublished GHSA check
        type: boolean
        default: false
      upload_sourceforge:
        description: Upload to SourceForge (requires SF secrets)
        type: boolean
        default: false
      docker_prep:
        description: Create PR for Docker version bumps in openemr-devops
        type: boolean
        default: false
      update_website:
        description: Create PR in website-openemr repo
        type: boolean
        default: false
  workflow_call:
    inputs:
      version_branch:
        description: Release branch (e.g., rel-800)
        required: true
        type: string
      version:
        description: Human-readable version (e.g., 8.0.0)
        required: true
        type: string
      release_tag:
        description: Git tag (e.g., v8_0_0). Required unless dry run.
        required: false
        type: string
      base_ref:
        description: Previous release tag for changelog (e.g., v7_3_7)
        required: true
        type: string
      milestone:
        description: GitHub milestone name for preflight check (e.g., 8.0.0)
        required: false
        type: string
      dry_run:
        description: Dry run — build only, skip release
        type: boolean
        default: true
      validate_token:
        description: Generate and verify the app token (use with dry run to test permissions)
        type: boolean
        default: false
      skip_milestone_check:
        description: Skip milestone open-items check
        type: boolean
        default: false
      skip_ghsa_check:
        description: Skip unpublished GHSA check
        type: boolean
        default: false
      upload_sourceforge:
        description: Upload to SourceForge (requires SF secrets)
        type: boolean
        default: false
      docker_prep:
        description: Create PR for Docker version bumps in openemr-devops
        type: boolean
        default: false
      update_website:
        description: Create PR in website-openemr repo
        type: boolean
        default: false

concurrency:
  group: build-release-${{ inputs.release_tag || inputs.version }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-24.04
    name: Build Release
    env:
      DEVOPS_DIR: ${{ github.workspace }}/devops-tools
      OPENEMR_DIR: ${{ github.workspace }}/openemr
      TOOLS_DIR: devops-tools/tools/release
    steps:
    - name: Validate inputs
      if: "!inputs.dry_run && inputs.release_tag == ''"
      run: |
        printf '::error::release_tag is required when dry_run is false\n'
        exit 1

    - name: Generate app token
      if: '!inputs.dry_run || inputs.validate_token'
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        owner: openemr
        repositories: openemr

    - name: Verify app token
      if: '!inputs.dry_run || inputs.validate_token'
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        echo "Checking app token can access openemr/openemr milestones..."
        gh api repos/openemr/openemr/milestones --jq '.[].title' | head -5
        echo 'App token verified.'

    - name: Checkout openemr release branch
      uses: actions/checkout@v6
      with:
        repository: openemr/openemr
        ref: ${{ inputs.version_branch }}
        path: openemr
        token: ${{ steps.app-token.outputs.token || github.token }}
        filter: blob:none
        fetch-depth: 1

    - name: Checkout openemr-devops (release tools)
      uses: actions/checkout@v6
      with:
        path: devops-tools
        sparse-checkout: tools/release

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'

    - name: Install Taskfile
      uses: arduino/setup-task@v2
      with:
        version: 3.x

    - name: Install release tools
      working-directory: devops-tools
      run: task release:setup

    - name: Preflight checks
      if: '(!inputs.skip_milestone_check && inputs.milestone != '''') || !inputs.skip_ghsa_check'
      working-directory: devops-tools
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
      run: >-
        task release:preflight
        MILESTONE='${{ inputs.milestone }}'
        SKIP_MILESTONE='${{ (inputs.skip_milestone_check || inputs.milestone == '') && '1' || '' }}'
        SKIP_GHSA='${{ inputs.skip_ghsa_check && '1' || '' }}'

    - name: Detect existing prep
      id: detect-prep
      working-directory: openemr
      run: |
        # `task release:version-bump MODE=full` performs two mutations
        # (see tools/release/bin/version-bump.php): clears `-dev` from
        # $v_tag in version.php, and sets the allow_debug_language
        # globals default to '0'. $v_tag is the canonical signal: a
        # `-dev` suffix means full-mode prep hasn't run yet (under
        # either the legacy path or the openemr/openemr conductor).
        # shellcheck disable=SC2016 # PHP variables, not shell
        v_tag=$(php -r 'include "version.php"; echo $v_tag;')
        case "$v_tag" in
          *-dev*)
            printf 'v_tag=%q contains -dev — running legacy prep\n' "$v_tag"
            printf 'prep_done=false\n' >> "$GITHUB_OUTPUT"
            ;;
          *)
            printf 'v_tag=%q is clean — skipping legacy prep\n' "$v_tag"
            printf 'prep_done=true\n' >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Version bump (full mode)
      if: "steps.detect-prep.outputs.prep_done != 'true'"
      working-directory: devops-tools
      run: >-
        task release:version-bump
        MODE=full
        OPENEMR_DIR='${{ env.OPENEMR_DIR }}'

    # Commit the bump locally in every run (dry included) so the package build's
    # `git archive HEAD` ships the exact bumped tree. The push to the release
    # branch is gated on a real release below.
    - name: Commit version changes
      if: "steps.detect-prep.outputs.prep_done != 'true'"
      working-directory: openemr
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add version.php library/globals.inc.php
        git commit -m 'chore: prepare ${{ inputs.version }} for release'

    - name: Push version changes
      if: "!inputs.dry_run && steps.detect-prep.outputs.prep_done != 'true'"
      working-directory: openemr
      run: git push origin HEAD:'${{ inputs.version_branch }}'

    - name: Generate changelog
      working-directory: devops-tools
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
      run: >-
        task release:changelog
        BASE_REF='${{ inputs.base_ref }}'
        HEAD_REF='${{ inputs.version_branch }}'
        TITLE='${{ inputs.version }}'

    # Inject the minimum-supported-versions section into the changelog so it
    # rides along into the release notes (--notes-file below). Runs after the
    # changelog exists and before the release is created.
    - name: Add compatibility section to release notes
      working-directory: devops-tools
      run: >-
        task release:compatibility
        VERSION_BRANCH='${{ inputs.version_branch }}'
        OPENEMR_DIR='${{ env.OPENEMR_DIR }}'

    # Build and checksum the package before creating the tag/release. If any
    # build step fails, the job aborts before a release exists — never publish
    # a release that has no distribution assets attached.
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Build distribution package
      working-directory: devops-tools
      run: >-
        task release:package:assemble
        VERSION='${{ inputs.version }}'
        OPENEMR_DIR='${{ env.OPENEMR_DIR }}'

    - name: Generate checksums
      working-directory: devops-tools
      run: |
        task release:checksum FILE="openemr-${{ inputs.version }}.tar.gz"
        task release:checksum FILE="openemr-${{ inputs.version }}.zip"

    - name: Create annotated tag and GitHub release
      if: '!inputs.dry_run'
      working-directory: openemr
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
      run: |
        tag='${{ inputs.release_tag }}'
        output_dir='${{ env.DEVOPS_DIR }}/tools/release/release-output'

        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

        # Check the remote, not the local checkout: the checkout step
        # uses fetch-depth: 1 and does not fetch tags, so a local
        # rev-parse always misses an already-published tag. That made
        # `git push origin "$tag"` fail with "tag already exists in the
        # remote" when re-firing after the openemr/openemr conductor
        # had already tagged via its finalize job.
        #
        # `git ls-remote --exit-code` returns 0 when the tag exists and 2
        # when it does not. Any other status is a real lookup failure
        # (auth, transport) and must abort rather than fall through to a
        # tag push that would mask the underlying error.
        tag_lookup_status=0
        git ls-remote --tags --exit-code origin "refs/tags/$tag" > /dev/null 2>&1 || tag_lookup_status=$?
        case "$tag_lookup_status" in
          0)
            echo "Tag $tag already exists on origin, skipping tag creation"
            ;;
          2)
            git tag -a -m "Release $tag" "$tag" '${{ inputs.version_branch }}'
            git push origin "$tag"
            ;;
          *)
            echo "::error::Failed to query origin for tag $tag (git ls-remote exit $tag_lookup_status)" >&2
            exit "$tag_lookup_status"
            ;;
        esac

        if ! gh release view "$tag" --repo openemr/openemr > /dev/null 2>&1; then
          echo "Creating release $tag"
          gh release create "$tag" \
            --repo openemr/openemr \
            --title "OpenEMR ${{ inputs.version }}" \
            --notes-file "${output_dir}/changelog.md" \
            --verify-tag
        fi

    - name: Upload package and checksums to release
      if: '!inputs.dry_run'
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
      run: |
        tag='${{ inputs.release_tag }}'
        output_dir='${{ env.DEVOPS_DIR }}/tools/release/release-output'

        gh release upload "$tag" \
          --repo openemr/openemr \
          --clobber \
          "${output_dir}/openemr-${{ inputs.version }}.tar.gz" \
          "${output_dir}/openemr-${{ inputs.version }}.zip" \
          "${output_dir}"/*.md5 \
          "${output_dir}"/*.sha256 \
          "${output_dir}"/*.sha512 \
          "${output_dir}/changelog.md"

    - name: Build summary
      working-directory: devops-tools
      run: >-
        task release:summary
        TYPE=full
        MILESTONE='${{ inputs.milestone }}'
        VERSION_BRANCH='${{ inputs.version_branch }}'
        RELEASE_TAG='${{ inputs.release_tag }}'
        DRY_RUN='${{ inputs.dry_run }}'

    - name: Upload artifacts (dry run)
      if: inputs.dry_run
      uses: actions/upload-artifact@v7
      with:
        name: release-${{ inputs.version }}
        path: |
          ${{ env.TOOLS_DIR }}/release-output/changelog.md
          ${{ env.TOOLS_DIR }}/release-output/*.md5
          ${{ env.TOOLS_DIR }}/release-output/*.sha256
          ${{ env.TOOLS_DIR }}/release-output/*.sha512
        retention-days: 7

    - name: Create CHANGELOG PRs
      if: '!inputs.dry_run'
      working-directory: devops-tools
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
      run: >-
        task release:changelog-pr
        VERSION='${{ inputs.version }}'
        BRANCHES='${{ inputs.version_branch }},master'
        OPENEMR_DIR='${{ env.OPENEMR_DIR }}'

    # Feature-flagged steps

    - name: Upload to SourceForge
      if: '!inputs.dry_run && inputs.upload_sourceforge'
      run: |
        echo '::notice::SourceForge upload not yet implemented'

    - name: Create Docker prep PR
      if: '!inputs.dry_run && inputs.docker_prep'
      run: |
        echo '::notice::Docker prep PR not yet implemented'

    - name: Create website update PR
      if: '!inputs.dry_run && inputs.update_website'
      run: |
        echo '::notice::Website update PR not yet implemented'
