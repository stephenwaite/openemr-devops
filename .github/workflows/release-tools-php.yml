name: Release Tools PHP

on:
  push:
    branches:
      - master
    paths:
      - 'tools/release/**.php'
      - 'tools/release/composer.json'
      - 'tools/release/composer.lock'
      - 'tools/release/phpstan.neon'
      - 'tools/release/phpcs.xml'
      - 'tools/release/rector.php'
      - '.github/workflows/release-tools-php.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tools/release/**.php'
      - 'tools/release/composer.json'
      - 'tools/release/composer.lock'
      - 'tools/release/phpstan.neon'
      - 'tools/release/phpcs.xml'
      - 'tools/release/rector.php'
      - '.github/workflows/release-tools-php.yml'

defaults:
  run:
    working-directory: tools/release

jobs:
  phpcs:
    name: PHP CodeSniffer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: cs2pr
      - run: composer install --no-interaction --no-progress
      - run: vendor/bin/phpcs --report=checkstyle | cs2pr

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - run: composer install --no-interaction --no-progress
      - run: vendor/bin/phpstan analyse

  rector:
    name: Rector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - run: composer install --no-interaction --no-progress
      - run: vendor/bin/rector process --dry-run

  require-checker:
    name: Composer Require Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
      - run: composer install --no-interaction --no-progress
      - run: vendor/bin/composer-require-checker check
