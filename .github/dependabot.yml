version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  # Docker - docker/openemr/7.0.4
  - package-ecosystem: "docker"
    directory: "/docker/openemr/7.0.4"
    schedule:
      interval: "daily"

  # Docker - docker/openemr/8.0.0
  - package-ecosystem: "docker"
    directory: "/docker/openemr/8.0.0"
    schedule:
      interval: "daily"

  # Docker - docker/openemr/8.1.0
  - package-ecosystem: "docker"
    directory: "/docker/openemr/8.1.0"
    schedule:
      interval: "daily"

  # Docker - docker/openemr/binary
  - package-ecosystem: "docker"
    directory: "/docker/openemr/binary"
    schedule:
      interval: "daily"

  # Docker - docker/openemr/flex
  - package-ecosystem: "docker"
    directory: "/docker/openemr/flex"
    schedule:
      interval: "daily"

  # Docker Compose - docker/openemr
  - package-ecosystem: "docker"
    directory: "/docker/openemr"
    schedule:
      interval: "daily"

  # Docker - Kubernetes manifests
  # Dependabot's docker ecosystem supports Kubernetes YAML files (image: fields).
  # Block major/minor bumps for version-pinned images (openemr, mariadb).
  - package-ecosystem: "docker"
    directories:
    - "/kubernetes"
    - "/kubernetes/openemr"
    - "/kubernetes/mysql"
    - "/kubernetes/redis"
    - "/kubernetes/phpmyadmin"
    - "/kubernetes/nfs"
    schedule:
      interval: "daily"
    ignore:
    - dependency-name: openemr/openemr
      update-types: [version-update:semver-major, version-update:semver-minor, version-update:semver-patch]
    - dependency-name: mariadb
      update-types: [version-update:semver-major, version-update:semver-minor]
    groups:
      mariadb:
        patterns:
        - mariadb
      redis:
        patterns:
        - redis
      openemr-images:
        patterns:
        - openemr/*
      phpmyadmin:
        patterns:
        - phpmyadmin
      infrastructure:
        patterns:
        - busybox
        - registry.k8s.io/*
    labels:
    - dependencies
    - docker
    - kubernetes

  # Docker Compose - packages/appliance
  - package-ecosystem: "docker"
    directory: "/packages/appliance"
    schedule:
      interval: "daily"

  # Docker Compose - utilities/mariadb-backup-manager
  - package-ecosystem: "docker"
    directory: "/utilities/mariadb-backup-manager"
    schedule:
      interval: "daily"

  # Docker Compose - utilities/openemr-monitor
  - package-ecosystem: "docker"
    directory: "/utilities/openemr-monitor"
    schedule:
      interval: "daily"
